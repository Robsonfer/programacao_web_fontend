<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 124 - Semantica em Formulários</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 30px auto;
            display: flex;
        }

        form {
            width: 300px;
            margin: 0 auto;
        }

        legend {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        fieldset {
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-radius: 8px;
        }

        input {
            margin: 10px;
            border-radius: 8px;
            height: 32px;
        }

        .submit {
            margin-top: 20px;
            background-color: red;
            color: white;
            font-size: 1.3em;
            font-weight: bold;
            height: 36px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <form action="pagina.php" method="post">
        <fieldset>
            <legend>Login</legend>
            <label for="log">User:</label>
            <input type="text" name="text" id="log">
            <label for="pass">Password:</label>
            <input type="password" name="pass" id="pass">
            <input type="submit" value="Login" class="submit">
        </fieldset>
    </form>

</body>

</html>
