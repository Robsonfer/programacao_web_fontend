<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 121 - popover</title>

    <style>
        :popover-open {
            width: 300px;
            padding: 0 10px;
            border-radius: 12px;
            text-align: center;
        }

        ::backdrop {
            background-color: rgba(0, 0, 0, 0.32);
        }

        .popover-container :popover-open {
            inset: unset;
        }
    </style>
</head>

<body>
    <h1>Curso de web design - popover</h1>

    <hr>
    <button popovertarget="my-popover">Toggle popover</button>
    <div id="my-popover" popover>Este texto é aberto ao clicar no botão</div>
    <hr>
    <button popovertarget="my-popover2">popover auto (default)</button>
    <div id="my-popover2" popover="auto">Este texto fecha ao clicar fora!</div>
    <hr>
    <button popovertarget="my-popover3">popover manual</button>
    <div id="my-popover3" popover="manual">Este texto não fecha ao clicar fora!</div>
    <hr>
    <button popovertarget="my-popover4" popovertargetaction="show">popover show</button>
    <button popovertarget="my-popover4" popovertargetaction="hide">popover hide</button>
    <div id="my-popover4" popover="manual">Este texto só fecha no botão popover hide</div>
    <hr>
    <div class="popover-container">
        <button popovertarget="my-popover5">Toogle popover</button>
        <div id="my-popover5" popover>Texto de ajuda do popover</div>
    </div>
    <hr>

</body>

</html>
