<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 120 - details e sumary</title>

    <style>
        body {
            font-family: sans-serif;
        }

        details {
            color: red;
            background-color: #ccc;
            margin-bottom: 1em;
            padding: 0.5em;
        }

        details summary {
            cursor: pointer;
        }

        details[open] {
            background-color: aqua;
            color: black;
        }
    </style>

</head>

<body>

    <h1>Curso Web Design</h1>
    <details open>
        <summary>Pré-requisitos</summary>
        <p>Para fazer esse curso é necessáro conhecimento de sistemas operacionais.</p>
    </details>

    <details>
        <summary>Carga horária</summary>
        <p>180 horas.</p>
    </details>

</body>

</html>
